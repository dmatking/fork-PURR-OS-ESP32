# mac.conf — MagicMac configuration
# Place this file next to magicmac.catt on flash or SD card.
# All fields are optional — missing fields use built-in defaults.

# Path to the 512KB Mac Plus ROM image.
# Legal note: the ROM is copyrighted by Apple. Dump your own from real hardware.
rom_path = /sdcard/magicmac/mac.rom

# Emulated RAM in kilobytes. Range: 128–4096.
# 512KB is Mac Plus default. Use 4096 if your device has PSRAM and you want headroom.
ram_kb = 512

# Display scaling mode when the Mac framebuffer (512x342) doesn't match the screen.
#   nearest  — nearest-neighbour scale to fill screen (default, fastest)
#   fit      — scale with aspect ratio preserved, letterbox bars on short axis
#   stretch  — stretch to fill, ignoring aspect ratio
scale_mode = nearest

# Override display dimensions (pixels). Set to 0 to read from the display catcall.
# Set these only if your display reports wrong dimensions.
#   tdeck_plus : display_w = 320  display_h = 240
#   jc3248w535 : display_w = 480  display_h = 320
display_w = 0
display_h = 0
